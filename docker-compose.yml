services:
  car-carer:
    build: .
    container_name: car-carer
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/care.db
      - UPLOAD_DIR=./uploads
