<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicule partage — Care of your Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="sharedView()" x-init="load()">
    <header class="bg-sky-700 text-white shadow-lg">
        <div class="max-w-3xl mx-auto px-4 py-4 flex items-center gap-3">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m10 0H3m10 0h2m4 0h1a1 1 0 001-1v-4.586a1 1 0 00-.293-.707l-3.414-3.414A1 1 0 0016.586 6H13"/></svg>
            <h1 class="text-lg font-bold">Care of your Car — Fiche partagee</h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
        <div x-show="loading" class="text-center py-20">
            <div class="animate-spin w-10 h-10 border-2 border-sky-500 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-gray-500 mt-3">Chargement...</p>
        </div>

        <div x-show="error" class="text-center py-20 text-red-500">
            <p class="text-lg font-medium" x-text="error"></p>
        </div>

        <div x-show="!loading && !error && data">
            <!-- Vehicle info -->
            <div class="bg-white rounded-xl shadow-sm border p-6 mb-6">
                <h2 class="text-2xl font-bold text-gray-800" x-text="data?.vehicle?.name"></h2>
                <p class="text-gray-500" x-text="[data?.vehicle?.brand, data?.vehicle?.model, data?.vehicle?.year ? '(' + data.vehicle.year + ')' : ''].filter(Boolean).join(' ')"></p>
                <p x-show="data?.vehicle?.plate_number" class="text-sm text-gray-400 mt-1" x-text="data?.vehicle?.plate_number"></p>
            </div>

            <!-- Health score -->
            <div x-show="data?.health_score" class="bg-white rounded-xl shadow-sm border p-6 mb-6">
                <div class="flex items-center gap-6">
                    <div class="text-center">
                        <span class="text-4xl font-bold" :class="data?.health_score?.color === 'green' ? 'text-green-600' : data?.health_score?.color === 'blue' ? 'text-blue-600' : data?.health_score?.color === 'orange' ? 'text-orange-600' : 'text-red-600'"
                              x-text="data?.health_score?.score"></span>
                        <p class="text-sm text-gray-500">/100</p>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold" x-text="'Sante : ' + (data?.health_score?.label || '')"
                            :class="data?.health_score?.color === 'green' ? 'text-green-600' : data?.health_score?.color === 'blue' ? 'text-blue-600' : data?.health_score?.color === 'orange' ? 'text-orange-600' : 'text-red-600'"></h3>
                        <p class="text-sm text-gray-500" x-text="data?.alerts_count + ' alerte(s), ' + data?.maintenance_count + ' entretien(s), ' + data?.ct_count + ' CT'"></p>
                    </div>
                </div>
            </div>

            <!-- CT Status -->
            <div x-show="data?.current_ct_status" class="bg-white rounded-xl shadow-sm border p-6 mb-6">
                <h3 class="font-bold text-gray-700 mb-3">Dernier controle technique</h3>
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-medium" x-text="data?.current_ct_status?.date + ' — ' + (data?.current_ct_status?.result || '').toUpperCase()"></p>
                        <p class="text-sm text-gray-500" x-text="(data?.current_ct_status?.mileage ? data.current_ct_status.mileage.toLocaleString() + ' km' : '')"></p>
                    </div>
                    <span class="text-xs px-3 py-1 rounded-full font-bold"
                          :class="data?.current_ct_status?.result === 'favorable' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                          x-text="(data?.current_ct_status?.result || '').toUpperCase()"></span>
                </div>
            </div>

            <!-- Maintenance history -->
            <div class="bg-white rounded-xl shadow-sm border p-6 mb-6">
                <h3 class="font-bold text-gray-700 mb-3" x-text="'Historique entretiens (' + (data?.maintenance?.length || 0) + ')'"></h3>
                <div class="space-y-2" x-show="data?.maintenance?.length > 0">
                    <template x-for="(ev, i) in (data?.maintenance || [])" :key="i">
                        <div class="flex justify-between items-center py-2 border-b last:border-b-0 text-sm">
                            <div>
                                <span class="font-medium" x-text="ev.date"></span>
                                <span class="text-gray-500 ml-2" x-text="ev.mileage ? ev.mileage.toLocaleString() + ' km' : ''"></span>
                                <span class="text-gray-400 ml-2" x-text="ev.garage || ''"></span>
                            </div>
                            <span class="font-medium text-sky-700" x-text="ev.total_cost ? ev.total_cost.toFixed(0) + ' EUR' : ''"></span>
                        </div>
                    </template>
                </div>
                <p x-show="!data?.maintenance?.length" class="text-gray-400 text-sm">Aucun entretien enregistre</p>
            </div>

            <!-- CT history -->
            <div class="bg-white rounded-xl shadow-sm border p-6">
                <h3 class="font-bold text-gray-700 mb-3" x-text="'Controles techniques (' + (data?.ct_reports?.length || 0) + ')'"></h3>
                <div class="space-y-2" x-show="data?.ct_reports?.length > 0">
                    <template x-for="(ct, i) in (data?.ct_reports || [])" :key="i">
                        <div class="flex justify-between items-center py-2 border-b last:border-b-0 text-sm">
                            <div>
                                <span class="font-medium" x-text="ct.date"></span>
                                <span class="text-gray-500 ml-2" x-text="ct.mileage ? ct.mileage.toLocaleString() + ' km' : ''"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500 text-xs" x-text="ct.defect_count + ' defaut(s)'"></span>
                                <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                                      :class="ct.result === 'favorable' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                      x-text="ct.result.toUpperCase()"></span>
                            </div>
                        </div>
                    </template>
                </div>
                <p x-show="!data?.ct_reports?.length" class="text-gray-400 text-sm">Aucun CT enregistre</p>
            </div>
        </div>
    </main>

    <script>
    function sharedView() {
        return {
            data: null,
            loading: true,
            error: null,
            async load() {
                const token = window.location.pathname.split('/shared/')[1];
                if (!token) { this.error = 'Lien invalide'; this.loading = false; return; }
                try {
                    const res = await fetch(`/api/shared/${token}`);
                    if (res.ok) { this.data = await res.json(); }
                    else { this.error = 'Lien de partage invalide ou expire'; }
                } catch (e) { this.error = 'Erreur de chargement'; }
                this.loading = false;
            }
        };
    }
    </script>
</body>
</html>
