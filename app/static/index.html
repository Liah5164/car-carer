<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0369a1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CarCare">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Care of your Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-init="init()">

    <!-- ==================== LOGIN / REGISTER ==================== -->
    <div x-show="!authenticated" class="min-h-screen flex items-center justify-center px-4" x-cloak>
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <svg class="w-16 h-16 mx-auto text-brand-700 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m10 0H3m10 0h2m4 0h1a1 1 0 001-1v-4.586a1 1 0 00-.293-.707l-3.414-3.414A1 1 0 0016.586 6H13"/></svg>
                <h1 class="text-2xl font-bold text-gray-800">Care of your Car</h1>
                <p class="text-gray-500 text-sm mt-1">Gerez l'entretien de vos vehicules intelligemment</p>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6 border">
                <!-- Tab toggle -->
                <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
                    <button @click="authView = 'login'" :class="authView === 'login' ? 'bg-white shadow text-brand-700' : 'text-gray-500'" class="flex-1 py-2 rounded-md text-sm font-medium transition">Connexion</button>
                    <button @click="authView = 'register'" :class="authView === 'register' ? 'bg-white shadow text-brand-700' : 'text-gray-500'" class="flex-1 py-2 rounded-md text-sm font-medium transition">Inscription</button>
                </div>

                <!-- Error -->
                <div x-show="authError" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4" x-text="authError"></div>

                <!-- Login form -->
                <form x-show="authView === 'login'" @submit.prevent="doLogin()" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input x-model="authEmail" type="email" required placeholder="vous@email.com" class="w-full border rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                        <input x-model="authPassword" type="password" required placeholder="••••••••" class="w-full border rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <button type="submit" :disabled="authLoading" class="w-full bg-brand-600 text-white py-2.5 rounded-lg hover:bg-brand-700 transition disabled:opacity-50 font-medium">
                        <span x-show="!authLoading">Se connecter</span>
                        <span x-show="authLoading" class="flex items-center justify-center gap-2">
                            <div class="animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
                            Connexion...
                        </span>
                    </button>
                </form>

                <!-- Register form -->
                <form x-show="authView === 'register'" @submit.prevent="doRegister()" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input x-model="authEmail" type="email" required placeholder="vous@email.com" class="w-full border rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                        <input x-model="authPassword" type="password" required minlength="6" placeholder="6 caracteres minimum" class="w-full border rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                    </div>
                    <button type="submit" :disabled="authLoading" class="w-full bg-brand-600 text-white py-2.5 rounded-lg hover:bg-brand-700 transition disabled:opacity-50 font-medium">
                        <span x-show="!authLoading">Creer mon compte</span>
                        <span x-show="authLoading" class="flex items-center justify-center gap-2">
                            <div class="animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></div>
                            Creation...
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ==================== AUTHENTICATED APP ==================== -->
    <template x-if="authenticated">
        <div>
            <!-- Header -->
            <header class="bg-brand-700 text-white shadow-lg">
                <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m10 0H3m10 0h2m4 0h1a1 1 0 001-1v-4.586a1 1 0 00-.293-.707l-3.414-3.414A1 1 0 0016.586 6H13"/></svg>
                        <h1 class="text-xl font-bold">Care of your Car</h1>
                    </div>
                    <div class="flex items-center gap-3">
                        <nav class="flex gap-1">
                            <button @click="view = 'dashboard'; loadDashboard()" :class="view === 'dashboard' ? 'bg-brand-600' : 'hover:bg-brand-600/50'" class="px-3 py-2 rounded-lg transition text-sm">Dashboard</button>
                            <button @click="view = 'vehicles'" :class="view === 'vehicles' ? 'bg-brand-600' : 'hover:bg-brand-600/50'" class="px-3 py-2 rounded-lg transition text-sm">Vehicules</button>
                            <button @click="view = 'chat'; loadConversations()" :class="view === 'chat' ? 'bg-brand-600' : 'hover:bg-brand-600/50'" class="px-3 py-2 rounded-lg transition text-sm">Chat</button>
                        </nav>
                        <div class="h-6 w-px bg-brand-500/50"></div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-brand-200 hidden sm:inline" x-text="currentUser?.email"></span>
                            <button @click="doLogout()" class="text-brand-200 hover:text-white transition" title="Deconnexion">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="max-w-7xl mx-auto px-4 py-6">

                <!-- DASHBOARD VIEW -->
                <div x-show="view === 'dashboard'" x-cloak>
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h2>
                    <div x-show="dashboardLoading" class="text-center py-10">
                        <div class="animate-spin w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full mx-auto"></div>
                    </div>
                    <div x-show="!dashboardLoading && dashboard">
                        <!-- Summary cards -->
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                            <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                                <p class="text-3xl font-bold text-brand-600" x-text="dashboard?.summary?.vehicle_count || 0"></p>
                                <p class="text-xs text-gray-500">Vehicule(s)</p>
                            </div>
                            <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                                <p class="text-3xl font-bold" :class="(dashboard?.summary?.avg_health_score || 0) >= 60 ? 'text-green-600' : 'text-orange-600'" x-text="dashboard?.summary?.avg_health_score || 0"></p>
                                <p class="text-xs text-gray-500">Score moyen</p>
                            </div>
                            <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                                <p class="text-3xl font-bold text-red-600" x-text="dashboard?.summary?.total_critical || 0"></p>
                                <p class="text-xs text-gray-500">Alertes critiques</p>
                            </div>
                            <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                                <p class="text-3xl font-bold text-orange-600" x-text="dashboard?.summary?.total_warnings || 0"></p>
                                <p class="text-xs text-gray-500">Avertissements</p>
                            </div>
                            <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                                <p class="text-2xl font-bold text-gray-700" x-text="(dashboard?.summary?.total_spent || 0).toLocaleString() + ' EUR'"></p>
                                <p class="text-xs text-gray-500">Total depense</p>
                            </div>
                        </div>

                        <!-- Vehicle cards -->
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="v in (dashboard?.vehicles || [])" :key="v.id">
                                <div class="bg-white rounded-xl shadow-sm border p-5 hover:shadow-md transition cursor-pointer" @click="view = 'vehicles'; $nextTick(() => { const veh = vehicles.find(x => x.id === v.id); if(veh) selectVehicle(veh); })">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <h3 class="font-bold text-gray-800" x-text="v.name"></h3>
                                            <p class="text-sm text-gray-500" x-text="[v.brand, v.model].filter(Boolean).join(' ') || ''"></p>
                                        </div>
                                        <div class="text-center">
                                            <span class="text-2xl font-bold" :class="v.health_color === 'green' ? 'text-green-600' : v.health_color === 'blue' ? 'text-blue-600' : v.health_color === 'orange' ? 'text-orange-600' : 'text-red-600'"
                                                  x-text="v.health_score ?? '?'"></span>
                                            <p class="text-xs" :class="v.health_color === 'green' ? 'text-green-500' : v.health_color === 'blue' ? 'text-blue-500' : v.health_color === 'orange' ? 'text-orange-500' : 'text-red-500'"
                                               x-text="v.health_label || ''"></p>
                                        </div>
                                    </div>
                                    <div class="flex gap-3 text-xs">
                                        <span x-show="v.critical_alerts > 0" class="bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-medium" x-text="v.critical_alerts + ' critique(s)'"></span>
                                        <span x-show="v.warning_alerts > 0" class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-medium" x-text="v.warning_alerts + ' avert.'"></span>
                                        <span class="text-gray-400" x-text="v.total_spent.toLocaleString() + ' EUR'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- VEHICLES VIEW -->
                <div x-show="view === 'vehicles'" x-cloak>
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-gray-800">Mes vehicules</h2>
                        <button @click="showAddVehicle = true" class="bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-700 transition flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            Ajouter
                        </button>
                    </div>

                    <!-- Vehicle cards -->
                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" x-show="vehicles.length > 0">
                        <template x-for="v in vehicles" :key="v.id">
                            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition cursor-pointer" @click="selectVehicle(v)">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <h3 class="font-bold text-lg text-gray-800" x-text="v.name"></h3>
                                        <p class="text-gray-500" x-text="[v.brand, v.model, v.year ? '(' + v.year + ')' : ''].filter(Boolean).join(' ') || 'Infos a completer via documents'"></p>
                                    </div>
                                    <span class="text-xs bg-brand-100 text-brand-700 px-2 py-1 rounded-full" x-text="v.plate_number || 'N/R'"></span>
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                    <div><span class="font-medium">Km:</span> <span x-text="v.last_mileage ? v.last_mileage.toLocaleString() : 'N/R'"></span></div>
                                    <div><span class="font-medium">Depense:</span> <span x-text="v.total_spent.toFixed(0) + ' EUR'"></span></div>
                                    <div><span class="font-medium">Documents:</span> <span x-text="v.document_count"></span></div>
                                    <div><span class="font-medium">CT:</span> <span x-text="v.ct_count"></span></div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Onboarding (empty state) -->
                    <div x-show="vehicles.length === 0" class="text-center py-16">
                        <svg class="w-20 h-20 mx-auto text-brand-300 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m10 0H3m10 0h2m4 0h1a1 1 0 001-1v-4.586a1 1 0 00-.293-.707l-3.414-3.414A1 1 0 0016.586 6H13"/></svg>
                        <h3 class="text-xl font-bold text-gray-700 mb-2">Bienvenue sur Care of your Car !</h3>
                        <p class="text-gray-500 mb-2 max-w-md mx-auto">Commencez par ajouter votre premier vehicule. Ensuite, importez vos factures et PV de controle technique pour un suivi intelligent.</p>
                        <div class="flex justify-center gap-6 mt-6 text-sm text-gray-400">
                            <div class="flex items-center gap-2">
                                <span class="w-8 h-8 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center font-bold">1</span>
                                Ajoutez un vehicule
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="w-8 h-8 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center font-bold">2</span>
                                Importez des documents
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="w-8 h-8 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center font-bold">3</span>
                                Consultez le bilan
                            </div>
                        </div>
                        <button @click="showAddVehicle = true" class="mt-8 bg-brand-600 text-white px-6 py-3 rounded-lg hover:bg-brand-700 transition text-lg font-medium inline-flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            Ajouter mon premier vehicule
                        </button>
                    </div>

                    <!-- Add Vehicle Modal -->
                    <div x-show="showAddVehicle" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak>
                        <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4 shadow-xl" @click.away="showAddVehicle = false">
                            <h3 class="text-xl font-bold mb-4">Nouveau vehicule</h3>
                            <form @submit.prevent="addVehicle()">
                                <div class="space-y-3">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Nom du vehicule *</label>
                                        <input x-model="newVehicle.name" type="text" required placeholder="Ex: Berlingo familial, Clio de Julie..." class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <p class="text-xs text-gray-400">Les autres informations (marque, modele, plaque...) seront remplies automatiquement a partir de vos documents.</p>
                                </div>
                                <div class="flex gap-3 mt-6">
                                    <button type="button" @click="showAddVehicle = false" class="flex-1 py-2 border rounded-lg hover:bg-gray-50">Annuler</button>
                                    <button type="submit" class="flex-1 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700">Creer</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Edit Vehicle Modal -->
                    <div x-show="showEditVehicle" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak>
                        <div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4 shadow-xl max-h-[90vh] overflow-y-auto" @click.away="showEditVehicle = false">
                            <h3 class="text-xl font-bold mb-4">Modifier le vehicule</h3>
                            <form @submit.prevent="saveVehicle()">
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="col-span-2">
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label>
                                        <input x-model="editVehicleData.name" type="text" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Marque</label>
                                        <input x-model="editVehicleData.brand" type="text" placeholder="Citroen, Renault..." class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Modele</label>
                                        <input x-model="editVehicleData.model" type="text" placeholder="Berlingo, Clio..." class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Annee</label>
                                        <input x-model="editVehicleData.year" type="number" min="1900" max="2100" placeholder="2018" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Immatriculation</label>
                                        <input x-model="editVehicleData.plate_number" type="text" placeholder="AB-123-CD" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">VIN</label>
                                        <input x-model="editVehicleData.vin" type="text" placeholder="Numero de serie" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Carburant</label>
                                        <select x-model="editVehicleData.fuel_type" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                            <option value="">--</option>
                                            <option value="diesel">Diesel</option>
                                            <option value="essence">Essence</option>
                                            <option value="hybride">Hybride</option>
                                            <option value="electrique">Electrique</option>
                                            <option value="gpl">GPL</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Km initial</label>
                                        <input x-model="editVehicleData.initial_mileage" type="number" min="0" placeholder="Ex: 85000" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Date d'achat</label>
                                        <input x-model="editVehicleData.purchase_date" type="date" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                                    </div>
                                </div>
                                <div class="flex gap-3 mt-6">
                                    <button type="button" @click="showEditVehicle = false" class="flex-1 py-2 border rounded-lg hover:bg-gray-50">Annuler</button>
                                    <button type="submit" class="flex-1 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700">Enregistrer</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Vehicle Detail -->
                    <div x-show="selectedVehicle" class="mt-6" x-cloak>
                        <div class="bg-white rounded-xl shadow-sm border p-6">
                            <div class="flex items-center justify-between mb-6">
                                <div class="flex items-center gap-4">
                                    <!-- Vehicle photo -->
                                    <div class="relative group">
                                        <div class="w-14 h-14 rounded-xl bg-gray-100 flex items-center justify-center overflow-hidden border-2 border-gray-200">
                                            <img x-show="vehiclePhotoUrl" :src="vehiclePhotoUrl" class="w-full h-full object-cover" alt="">
                                            <svg x-show="!vehiclePhotoUrl" class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10m10 0H3m10 0h2m4 0h1a1 1 0 001-1v-4.586a1 1 0 00-.293-.707l-3.414-3.414A1 1 0 0016.586 6H13"/></svg>
                                        </div>
                                        <label class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-xl opacity-0 group-hover:opacity-100 cursor-pointer transition">

                                    <button @click="selectedVehicle = null" class="text-gray-400 hover:text-gray-600">

                            <!-- Share link banner -->

                                <svg class="w-10 h-10 mx-auto text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                                <p class="text-gray-600 mb-2">Glissez vos documents ici ou</p>
                                <div class="flex gap-2 justify-center flex-wrap">
                                    <label class="cursor-pointer bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-700 transition inline-flex items-center gap-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                        Parcourir
                                        <input type="file" class="hidden" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple @change="handleFileSelect($event)">
                                    </label>
                                    <label class="cursor-pointer bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition inline-flex items-center gap-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                        Photo
                                        <input type="file" class="hidden" accept="image/*" capture="environment" @change="handleFileSelect($event)">
                                    </label>
                                </div>
                                <div class="mt-2 flex justify-center gap-3">
                                    <label class="text-sm text-gray-500">
                                        <input type="radio" x-model="uploadDocType" value="auto" class="mr-1"> Auto

                                    <label class="text-sm text-gray-500">
                                        <input type="radio" x-model="uploadDocType" value="invoice" class="mr-1"> Facture
                                    </label>
                                    <label class="text-sm text-gray-500">
                                        <input type="radio" x-model="uploadDocType" value="ct_report" class="mr-1"> CT
                                    </label>
                                    <label class="text-sm text-gray-500">
                                        <input type="radio" x-model="uploadDocType" value="quote" class="mr-1"> Devis
                                    </label>

                                <div x-show="uploading && !batchProgress" class="mt-3">

                                </div>
                                <div x-show="uploadResult && !batchProgress" class="mt-3 text-sm" :class="uploadResult?.success ? 'text-green-600' : 'text-red-600'" x-text="uploadResult?.message"></div>

                                <div x-show="batchProgress" class="mt-4 text-left" x-cloak>
                                    <div class="flex justify-between text-sm mb-1">
                                        <span class="font-medium" x-text="'Analyse : ' + batchProgress?.processed + ' / ' + batchProgress?.total"></span>
                                        <span class="text-gray-500" x-text="batchProgress?.done ? 'Termine' : 'En cours...'"></span>
                                    </div>
                                    <div class="w-full bg-gray-200 rounded-full h-3 mb-3">
                                        <div class="bg-brand-600 h-3 rounded-full transition-all duration-300" :style="'width:' + (batchProgress ? (batchProgress.processed / batchProgress.total * 100) : 0) + '%'"></div>
                                    </div>
                                    <div class="max-h-40 overflow-y-auto space-y-1">
                                        <template x-for="(r, i) in batchResults" :key="i">
                                            <div class="text-xs flex items-center gap-2 py-0.5">
                                                <span :class="r.success ? 'text-green-500' : 'text-red-500'" x-text="r.success ? 'OK' : 'ERR'"></span>
                                                <span class="truncate flex-1" x-text="r.filename"></span>
                                                <span class="text-gray-400 whitespace-nowrap" x-text="r.message"></span>
                                            </div>
                                        </template>
                                    </div>
                                    <div x-show="batchProgress?.done" class="mt-2 text-sm font-medium" :class="batchProgress?.error_count ? 'text-orange-600' : 'text-green-600'"

                                </div>
                            </div>

                            <!-- Pending documents banner -->
                            <div x-show="pendingDocs.length > 0" class="bg-amber-50 border border-amber-300 rounded-lg p-4 mb-6" x-cloak>
                                <div class="flex items-center gap-2 mb-2">
                                    <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                                    <span class="font-medium text-amber-800" x-text="pendingDocs.length + ' document(s) en attente de confirmation de date'"></span>
                                </div>
                                <div class="space-y-2">
                                    <template x-for="p in pendingDocs" :key="p.id">

                                                <span class="font-medium" x-text="p.original_filename"></span>
                                                <span class="text-gray-500 ml-2" x-text="p.doc_type === 'ct_report' ? 'CT' : p.doc_type === 'invoice' ? 'Facture' : p.doc_type === 'quote' ? 'Devis' : p.doc_type"></span>
                                                <span class="text-amber-600 ml-2" x-text="'Date extraite: ' + (p.extracted_date || '?')"></span>
                                                <span class="text-gray-400 ml-2" x-text="p.garage_name ? '(' + p.garage_name + ')' : ''"></span>

                                </div>

                            <div class="flex border-b mb-4 overflow-x-auto">

                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                                    Bilan
                                    <span x-show="analysis && analysis.alerts.filter(a => (a.level === 'critical' || a.level === 'warning')).length > 0"
                                          class="ml-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
                                          x-text="analysis ? analysis.alerts.filter(a => a.level === 'critical' || a.level === 'warning').length : ''"></span>
                                </button>
                                <button @click="detailTab = 'maintenance'" :class="detailTab === 'maintenance' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">Entretiens</button>
                                <button @click="detailTab = 'ct'" :class="detailTab === 'ct' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">CT</button>
                                <button @click="detailTab = 'stats'; renderCharts()" :class="detailTab === 'stats' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>

                                </button>
                                <button @click="detailTab = 'calendar'; loadCalendar()" :class="detailTab === 'calendar' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>

                                <button @click="detailTab = 'docs'" :class="detailTab === 'docs' ? 'border-brand-500 text-brand-600' : 'border-transparent text-gray-500'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">Documents</button>

                                                            :stroke-dashoffset="2 * Math.PI * 42 * (1 - analysis.health_score.score / 100)"/>

                                                <div class="absolute inset-0 flex items-center justify-center">

                                                <div class="mt-2 space-y-1">
                                                    <template x-for="(d, i) in (analysis.health_score.details || [])" :key="i">
                                                        <p class="text-xs text-gray-500" x-text="d[0] + ' (' + d[1] + ' pts)'"></p>

                                                </div>
                                            </div>

                                                </div>
                                                <div class="text-right">
                                                    <span class="text-3xl font-bold" :class="analysis?.current_ct_status?.result === 'favorable' ? 'text-green-600' : 'text-red-600'" x-text="analysis?.current_ct_status?.defect_count || 0"></span>
                                                    <p class="text-xs text-gray-500">defaut(s)</p>
                                                </div>
                                            </div>
                                            <p x-show="analysis?.current_ct_status?.next_due" class="text-sm mt-2 text-gray-600" x-text="'Prochaine echeance : ' + (analysis?.current_ct_status?.next_due || '')"></p>
                                        </div>
                                    </div>

                                    <template x-if="analysis && analysis.alerts.filter(a => a.level === 'critical' && a.category !== 'interval').length > 0">

                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>

                                            <div class="space-y-2">
                                                <template x-for="a in analysis.alerts.filter(a => a.level === 'critical' && a.category !== 'interval')" :key="a.title">

                                                        <div class="flex items-start gap-2">
                                                            <span class="text-xs px-2 py-0.5 rounded-full font-bold bg-red-100 text-red-700 whitespace-nowrap mt-0.5">CRITIQUE</span>
                                                            <div class="flex-1">
                                                                <p class="font-medium text-red-800 text-sm" x-text="a.title"></p>
                                                                <p class="text-xs text-red-700 mt-1 whitespace-pre-line" x-text="a.detail"></p>
                                                            </div>
                                                            <button @click="openAlertChat(a)" class="text-xs px-3 py-1.5 bg-red-600 text-white rounded-lg hover:bg-red-700 transition whitespace-nowrap flex-shrink-0">Comprendre</button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                    <template x-if="analysis && analysis.alerts.filter(a => a.level === 'warning' && a.category !== 'interval').length > 0">
                                        <div class="mb-6">
                                            <h4 class="font-bold text-orange-700 mb-3 flex items-center gap-2">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                                Avertissements
                                            </h4>
                                            <div class="space-y-2">
                                                <template x-for="a in analysis.alerts.filter(a => a.level === 'warning' && a.category !== 'interval')" :key="a.title">
                                                    <div class="border rounded-lg p-3 bg-orange-50 border-orange-200">
                                                        <div class="flex items-start gap-2">
                                                            <span class="text-xs px-2 py-0.5 rounded-full font-bold bg-orange-100 text-orange-700 whitespace-nowrap mt-0.5">ATTENTION</span>
                                                            <div class="flex-1">
                                                                <p class="font-medium text-orange-800 text-sm" x-text="a.title"></p>
                                                                <p class="text-xs text-orange-700 mt-1 whitespace-pre-line" x-text="a.detail"></p>
                                                            </div>
                                                            <button @click="openAlertChat(a)" class="text-xs px-3 py-1.5 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition whitespace-nowrap flex-shrink-0">Comprendre</button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>

                                    <!-- Maintenance intervals -->
                                    <div class="mb-6">
                                        <h4 class="font-bold text-gray-700 mb-3 flex items-center gap-2">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                            Intervalles d'entretien
                                        </h4>
                                        <div class="grid gap-2">
                                            <template x-for="a in (analysis?.maintenance_intervals || [])" :key="a.title">

                                            <template x-for="y in (budgetForecast?.yearly_history || [])" :key="y.year">
                                                <div class="bg-white border rounded-lg p-3 text-center">
                                                    <p class="text-lg font-bold text-gray-700" x-text="y.amount.toLocaleString() + ' EUR'"></p>
                                                    <p class="text-xs text-gray-400" x-text="y.year"></p>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Category breakdown -->
                                    <div x-show="budgetForecast?.breakdown?.length > 0" class="mb-6">
                                        <h4 class="font-bold text-gray-700 mb-3">Prevision par categorie</h4>
                                        <div class="space-y-2">
                                            <template x-for="b in (budgetForecast?.breakdown || []).slice(0, 10)" :key="b.category">
                                                <div class="flex items-center gap-3">
                                                    <span class="text-sm font-medium w-40 truncate" x-text="b.category"></span>
                                                    <div class="flex-1 bg-gray-200 rounded-full h-4">
                                                        <div class="bg-brand-500 h-4 rounded-full transition-all"
                                                             :style="'width:' + Math.min(100, (b.yearly_avg / (budgetForecast?.forecast || 1)) * 100) + '%'"></div>
                                                    </div>
                                                    <span class="text-sm font-medium w-24 text-right" x-text="b.yearly_avg.toLocaleString() + ' EUR'"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Price history -->
                                    <div x-show="priceHistory && Object.keys(priceHistory?.categories || {}).length > 0">
                                        <h4 class="font-bold text-gray-700 mb-3">Evolution des prix par categorie</h4>
                                        <div class="space-y-3">
                                            <template x-for="[cat, points] in Object.entries(priceHistory?.categories || {})" :key="cat">
                                                <div class="border rounded-lg p-3">
                                                    <p class="font-medium text-sm mb-2" x-text="cat"></p>
                                                    <div class="flex flex-wrap gap-2">
                                                        <template x-for="(p, i) in points" :key="i">
                                                            <div class="text-xs bg-gray-50 rounded px-2 py-1">
                                                                <span class="text-gray-500" x-text="p.date"></span>
                                                                <span class="font-medium ml-1" x-text="p.price + ' EUR'"></span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Calendar tab -->
                            <div x-show="detailTab === 'calendar'">
                                <div x-show="calendarLoading" class="text-center py-10">
                                    <div class="animate-spin w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full mx-auto"></div>
                                </div>
                                <div x-show="!calendarLoading">
                                    <div class="flex items-center justify-between mb-4">
                                        <h4 class="font-bold text-gray-700">Prochaines echeances</h4>
                                        <button @click="enableNotifications()" x-show="!notificationsEnabled"
                                                class="text-xs bg-brand-100 text-brand-700 px-3 py-1.5 rounded-lg hover:bg-brand-200 transition flex items-center gap-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                                            Activer les notifications
                                        </button>
                                        <span x-show="notificationsEnabled" class="text-xs text-green-600 flex items-center gap-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"/></svg>
                                            Notifications actives
                                        </span>
                                    </div>
                                    <div x-show="calendar.length === 0" class="text-center py-10 text-gray-400">
                                        Aucune echeance prevue. Ajoutez des documents pour generer le calendrier.
                                    </div>
                                    <div class="space-y-2">
                                        <template x-for="(item, i) in calendar" :key="i">
                                            <div class="border rounded-lg p-4 flex items-center gap-4"
                                                 :class="item.priority === 'overdue' ? 'bg-red-50 border-red-200' : item.priority === 'high' ? 'bg-orange-50 border-orange-200' : 'bg-white'">
                                                <div class="text-center min-w-[60px]">
                                                    <p class="text-2xl font-bold" :class="item.priority === 'overdue' ? 'text-red-600' : item.priority === 'high' ? 'text-orange-600' : 'text-brand-600'"
                                                       x-text="item.due_date ? new Date(item.due_date + 'T00:00').toLocaleDateString('fr-FR', {day: '2-digit'}) : '?'"></p>
                                                    <p class="text-xs text-gray-500" x-text="item.due_date ? new Date(item.due_date + 'T00:00').toLocaleDateString('fr-FR', {month: 'short', year: 'numeric'}) : ''"></p>
                                                </div>
                                                <div class="flex-1">
                                                    <p class="font-medium text-sm" x-text="item.type"></p>
                                                    <p x-show="item.detail" class="text-xs text-gray-500 mt-0.5 truncate" x-text="item.detail"></p>
                                                </div>
                                                <span class="text-xs px-2 py-1 rounded-full font-bold"
                                                      :class="item.priority === 'overdue' ? 'bg-red-100 text-red-700' : item.priority === 'high' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'"
                                                      x-text="item.priority === 'overdue' ? 'EN RETARD' : item.priority === 'high' ? 'URGENT' : 'PREVU'"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <!-- Quotes comparison tab -->
                            <div x-show="detailTab === 'quotes'">
                                <div x-show="!quoteComparison || quoteComparison.quotes.length === 0" class="text-center py-10 text-gray-400">
                                    Aucun devis. Importez des devis pour comparer les prix.
                                </div>
                                <div x-show="quoteComparison && quoteComparison.quotes.length > 0">
                                    <h4 class="font-bold text-gray-700 mb-4">Comparaison des devis</h4>
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-sm border-collapse">
                                            <thead>
                                                <tr class="bg-gray-50">
                                                    <th class="text-left p-3 border-b font-medium text-gray-600">Categorie</th>
                                                    <template x-for="(q, qi) in (quoteComparison?.quotes || [])" :key="qi">
                                                        <th class="text-right p-3 border-b font-medium text-gray-600 min-w-[120px]">
                                                            <div x-text="q.garage || ('Devis ' + (qi+1))"></div>
                                                            <div class="text-xs text-gray-400 font-normal" x-text="q.date || ''"></div>
                                                        </th>
                                                    </template>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="cat in (quoteComparison?.categories || [])" :key="cat">
                                                    <tr class="border-b hover:bg-gray-50">
                                                        <td class="p-3 font-medium" x-text="cat"></td>
                                                        <template x-for="(q, qi) in (quoteComparison?.quotes || [])" :key="qi">
                                                            <td class="p-3 text-right" x-text="q.items_by_category[cat] ? q.items_by_category[cat].toFixed(2) + ' EUR' : '—'"></td>
                                                        </template>
                                                    </tr>
                                                </template>
                                            </tbody>
                                            <tfoot>
                                                <tr class="bg-gray-50 font-bold">
                                                    <td class="p-3">TOTAL</td>
                                                    <template x-for="(q, qi) in (quoteComparison?.quotes || [])" :key="qi">
                                                        <td class="p-3 text-right" :class="quoteComparison.quotes.every(oq => q.total <= oq.total) ? 'text-green-600' : ''"
                                                            x-text="q.total.toFixed(2) + ' EUR'"></td>
                                                    </template>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            <!-- Docs tab -->
                            <div x-show="detailTab === 'docs'">
                                <div x-show="documents.length === 0" class="text-center py-10 text-gray-400">Aucun document</div>
                                <div class="space-y-2">
                                    <template x-for="doc in documents" :key="doc.id">
                                        <div class="flex items-center justify-between border rounded-lg p-3">
                                            <div>
                                                <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" x-text="doc.doc_type"></span>
                                                <span class="ml-2 text-sm" x-text="doc.original_filename"></span>
                                            </div>
                                            <div class="text-xs text-gray-400 flex items-center gap-2">
                                                <span x-text="new Date(doc.uploaded_at).toLocaleDateString('fr-FR')"></span>
                                                <span :class="doc.extracted ? 'text-green-500' : 'text-orange-500'" x-text="doc.extracted ? 'Extrait' : 'Non extrait'"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CHAT VIEW -->
                <div x-show="view === 'chat'" class="h-[calc(100vh-120px)] flex gap-4" x-cloak>
                    <!-- Sidebar (hidden on mobile, toggle via button) -->
                    <div class="hidden md:flex w-72 bg-white rounded-xl shadow-sm border p-4 flex-col">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Vehicule</label>
                            <select x-model.number="chatVehicleId" class="w-full border rounded-lg px-3 py-2 text-sm" @change="loadConversations()">
                                <option :value="null">Tous</option>
                                <template x-for="v in vehicles" :key="v.id">
                                    <option :value="v.id" x-text="v.name"></option>
                                </template>
                            </select>
                        </div>
                        <button @click="newConversation()" class="w-full bg-brand-600 text-white py-2 rounded-lg hover:bg-brand-700 transition text-sm mb-4">
                            Nouvelle conversation
                        </button>
                        <div class="flex-1 overflow-y-auto space-y-1">
                            <template x-for="c in conversations" :key="c.id">
                                <div @click="selectConversation(c)"
                                     :class="currentConversation?.id === c.id ? 'bg-brand-50 border-brand-300' : 'hover:bg-gray-50 border-transparent'"
                                     class="p-2 rounded-lg cursor-pointer border transition">
                                    <p class="text-sm font-medium truncate" x-text="c.title || 'Sans titre'"></p>
                                    <p class="text-xs text-gray-400" x-text="c.message_count + ' messages'"></p>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Chat area -->
                    <div class="flex-1 bg-white rounded-xl shadow-sm border flex flex-col">
                        <div x-ref="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-4">
                            <div x-show="!currentConversation" class="h-full flex items-center justify-center text-gray-400">
                                <div class="text-center">
                                    <svg class="w-16 h-16 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                                    <p>Selectionnez ou creez une conversation</p>
                                </div>
                            </div>
                            <template x-for="msg in chatMessages" :key="msg.id">
                                <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                                    <div :class="msg.role === 'user' ? 'bg-brand-600 text-white' : 'bg-gray-100 text-gray-800'" class="max-w-[75%] rounded-2xl px-4 py-3">
                                        <div class="text-sm whitespace-pre-wrap" x-html="msg.role === 'assistant' ? formatMarkdown(msg.content) : msg.content"></div>
                                        <div class="text-xs mt-1 opacity-60" x-text="new Date(msg.created_at).toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})"></div>
                                    </div>
                                </div>
                            </template>
                            <div x-show="chatLoading" class="flex justify-start">
                                <div class="bg-gray-100 rounded-2xl px-4 py-3">
                                    <div class="flex gap-1">
                                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="border-t p-4">
                            <form @submit.prevent="sendMessage()" class="flex gap-3">
                                <input x-model="chatInput" type="text" placeholder="Posez votre question sur votre vehicule..."
                                       class="flex-1 border rounded-xl px-4 py-3 focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                                       :disabled="chatLoading">
                                <button type="submit" :disabled="chatLoading || !chatInput.trim()" class="bg-brand-600 text-white px-6 rounded-xl hover:bg-brand-700 transition disabled:opacity-50">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Date Clarification Modal -->
                <div x-show="showClarifyModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak>
                    <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4 shadow-xl" @click.away="showClarifyModal = false">
                        <div class="flex items-center gap-2 mb-4">
                            <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <h3 class="text-xl font-bold">Confirmer la date</h3>
                        </div>
                        <p class="text-sm text-gray-600 mb-4">La date extraite de ce document n'est pas fiable (illisible, floue, ou possiblement la date du scan). Veuillez confirmer ou corriger :</p>
                        <div class="bg-gray-50 rounded-lg p-3 mb-4 text-sm space-y-1">
                            <div x-show="clarifyDoc?.filename"><span class="font-medium">Fichier :</span> <span x-text="clarifyDoc?.filename"></span></div>
                            <div><span class="font-medium">Type :</span> <span x-text="clarifyDoc?.doc_type === 'ct_report' ? 'Controle technique' : clarifyDoc?.doc_type === 'invoice' ? 'Facture' : clarifyDoc?.doc_type === 'quote' ? 'Devis' : clarifyDoc?.doc_type"></span></div>
                            <div x-show="clarifyDoc?.garage_name"><span class="font-medium">Garage :</span> <span x-text="clarifyDoc?.garage_name"></span></div>
                            <div x-show="clarifyDoc?.mileage"><span class="font-medium">Km :</span> <span x-text="clarifyDoc?.mileage?.toLocaleString()"></span></div>
                            <div x-show="clarifyDoc?.total_cost"><span class="font-medium">Montant :</span> <span x-text="clarifyDoc?.total_cost + ' EUR'"></span></div>
                            <div><span class="font-medium">Date extraite :</span> <span class="text-amber-600 font-medium" x-text="clarifyDoc?.extracted_date || 'Non lisible'"></span></div>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date corrigee *</label>
                            <input x-model="clarifyDate" type="date" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        </div>
                        <div class="flex gap-3">
                            <button type="button" @click="showClarifyModal = false" class="flex-1 py-2 border rounded-lg hover:bg-gray-50">Annuler</button>
                            <button type="button" @click="confirmDate()" class="flex-1 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700">Confirmer</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <script src="/static/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
